# Preserve the original protocol from upstream proxies (Cloudflare, etc.)
# Falls back to $scheme when no X-Forwarded-Proto header is present.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    # Docker internal DNS — re-resolve on every request so containers
    # can restart without requiring an nginx reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ── API requests → backend ───────────────────────────────
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
        client_max_body_size 20M;
    }

    # ── Django admin ─────────────────────────────────────────
    location /admin/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";
    }

    # ── Media uploads ────────────────────────────────────────
    location /media/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Avatar assets ────────────────────────────────────────
    location /avatars/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Django static (served by whitenoise) ─────────────────
    location /static/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── SPA fallback — serve index.html for all other routes ─
    location / {
        try_files $uri $uri/ /index.html;
    }
}
